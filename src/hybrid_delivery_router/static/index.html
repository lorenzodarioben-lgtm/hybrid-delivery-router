<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Delivery Router</title></head><body><main><h1>Delivery routing simulator</h1><p>Plan and inspect deterministic, disruption-aware delivery routes.</p><label>Scenario <select id="scenario"></select></label><button id="load">Load scenarios</button><pre id="result" aria-live="polite"></pre></main><script>const s=document.querySelector('#scenario'),r=document.querySelector('#result');document.querySelector('#load').onclick=async()=>{let x=await fetch('/api/v1/scenarios').then(a=>a.json());s.innerHTML=x.scenarios.map(v=>`<option>${v}</option>`).join('');r.textContent='Scenario list loaded.'}</script></body></html>
